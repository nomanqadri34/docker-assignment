services:
  # ── Flask Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask-backend
    ports:
      - "5000:5000"
    networks:
      - app-network
    restart: unless-stopped

  # ── Express Frontend ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: express-frontend
    ports:
      - "3000:3000"
    environment:
      - FLASK_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

# ── Shared Network ─────────────────────────────────
networks:
  app-network:
    driver: bridge
