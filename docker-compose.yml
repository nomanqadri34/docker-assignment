services:
  # ── Flask Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask-backend
    # Explicitly exposing ports for internal container communication
    # (Optional: remove external ports if only Nginx should access it)
    ports:
      - "5000:5000"
    networks:
      - app-network
    restart: unless-stopped

  # ── Express Frontend ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: express-frontend
    ports:
      - "3000:3000"
    environment:
      - FLASK_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # ── Nginx Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
    networks:
      - app-network
    restart: unless-stopped

# ── Shared Network ─────────────────────────────────
networks:
  app-network:
    driver: bridge
