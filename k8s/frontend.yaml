apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: express-frontend
  template:
    metadata:
      labels:
        app: express-frontend
    spec:
      containers:
      - name: express-frontend
        image: express-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: FLASK_URL
          value: "http://backend-service:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: express-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    nodePort: 30080
